<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>goal overlay</title>
  <link rel="icon" href="__APP_BASE_PATH__/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&family=IBM+Plex+Sans:wght@500;700&family=Archivo+Black&display=swap" rel="stylesheet" />
  <style>
    :root {
      --panel-pad: 20px;
      --eyebrow-size: 22px;
      --goal-size: 40px;
      --bar-height: 18px;
      --radius: 18px;
      --goal-width: 18ch;
      --content-width: 18ch;
      --width-scale: 1;
      --font-scale: 1;
      --alpha: 0.58;
      --accent: #ff79c6;
      --accent-soft: rgba(255, 121, 198, .35);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, .82);
      --glass: rgba(9, 10, 18, .58);
      --border: rgba(255, 255, 255, .16);
      --shadow: 0 26px 80px rgba(0, 0, 0, .28);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
    }
    body.preview {
      align-items: flex-start;
      justify-content: flex-start;
      padding: 12px;
      overflow: auto;
    }
    body.font-2 { font-family: 'IBM Plex Sans', sans-serif; }
    body.font-3 { font-family: 'Archivo Black', sans-serif; }
    .overlay {
      width: fit-content;
      max-width: min(100%, calc(var(--content-width) + (var(--panel-pad) * 2)));
      background: linear-gradient(180deg, color-mix(in srgb, var(--glass) 92%, transparent), color-mix(in srgb, var(--glass) 100%, transparent));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(7px);
      padding: var(--panel-pad);
    }
    body.preview .overlay {
      transform-origin: top left;
      transform: scale(var(--preview-scale, .78));
    }
    .eyebrow {
      display: grid;
      grid-template-columns: minmax(0, max-content) max-content;
      align-items: center;
      justify-content: start;
      column-gap: 1rem;
      margin-bottom: 12px;
      font-size: calc(var(--eyebrow-size) * var(--font-scale));
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .eyebrow-label {
      color: rgba(255, 255, 255, .9);
      font-weight: 800;
      letter-spacing: .1em;
    }
    .eyebrow-target {
      color: var(--text);
    }
    .eyebrow-target strong {
      color: var(--accent);
      font-weight: 800;
    }
    .goal {
      position: relative;
      overflow: hidden;
      white-space: nowrap;
      width: var(--goal-width);
      font-size: calc(var(--goal-size) * var(--font-scale));
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -.03em;
      margin-bottom: 12px;
      min-height: calc(var(--goal-size) * var(--font-scale) * 1.15);
    }
    .goal-text {
      display: inline-block;
      max-width: 100%;
      vertical-align: top;
    }
    .goal.marquee .goal-text {
      max-width: none;
      padding-right: 2.5rem;
      animation: goal-marquee var(--goal-marquee-duration, 12s) linear infinite;
    }
    @keyframes goal-marquee {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(calc(-1 * (100% - var(--goal-visible-width, 0px))));
      }
    }
    .bar {
      width: var(--goal-width);
      height: var(--bar-height);
      border-radius: 999px;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.12);
      overflow: hidden;
      margin-bottom: 0;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 74%, white 26%), var(--accent));
      box-shadow: 0 0 18px var(--accent-soft);
      transition: width .22s ease-out;
    }
    .copy {
      display: none;
    }
    .hidden {
      display: none !important;
    }
    body.size-1 {
      --panel-pad: 12px;
      --eyebrow-size: 12px;
      --goal-size: 22px;
      --bar-height: 9px;
      --radius: 12px;
    }
    body.size-2 {
      --panel-pad: 18px;
      --eyebrow-size: 18px;
      --goal-size: 32px;
      --bar-height: 14px;
      --radius: 16px;
    }
    body.size-3 {
      --panel-pad: 24px;
      --eyebrow-size: 24px;
      --goal-size: 42px;
      --bar-height: 18px;
      --radius: 18px;
    }
  </style>
</head>
<body class="size-2 font-2">
  <div class="overlay">
    <div class="eyebrow">
      <div class="eyebrow-label">GOALS</div>
      <div class="eyebrow-target"><strong id="goal-current">0</strong> / <span id="goal-next">0</span></div>
    </div>
    <div class="goal" id="goal-name"><span class="goal-text" id="goal-name-text">loading…</span></div>
    <div class="bar"><div class="bar-fill" id="goal-fill"></div></div>
  </div>
  <span id="goal-width-measure" style="position:absolute;visibility:hidden;white-space:nowrap;pointer-events:none;">Play 10 Hypixel UHCs</span>

  <script>
    const params = new URLSearchParams(location.search);
    const requestedChannel = (params.get('channel') || 'fruitberries').trim().toLowerCase();
    const font = Math.max(1, Math.min(3, parseInt(params.get('font') || '2', 10) || 2));
    const accent = Math.max(1, Math.min(5, parseInt(params.get('accent') || '5', 10) || 5));
    const alpha = Math.max(20, Math.min(95, parseInt(params.get('alpha') || '58', 10) || 58));
    const preview = params.get('preview') === '1';

    document.body.classList.add(`font-${font}`);
    if (preview) document.body.classList.add('preview');

    const accentMap = {
      1: { accent: '#ff79c6', soft: 'rgba(255, 121, 198, .35)' },
      2: { accent: '#f6c177', soft: 'rgba(246, 193, 119, .35)' },
      3: { accent: '#8be9fd', soft: 'rgba(139, 233, 253, .35)' },
      4: { accent: '#50fa7b', soft: 'rgba(80, 250, 123, .35)' },
      5: { accent: 'rgba(255, 255, 255, .92)', soft: 'rgba(255, 255, 255, .18)' },
    };
    const activeAccent = accentMap[accent];
    const root = document.documentElement;
    root.style.setProperty('--accent', activeAccent.accent);
    root.style.setProperty('--accent-soft', activeAccent.soft);
    root.style.setProperty('--glass', `rgba(9, 10, 18, ${alpha / 100})`);
    if (preview) {
      root.style.setProperty('--preview-scale', '0.86');
    }

    function fmt(n) { return (n ?? 0).toLocaleString(); }
    function statsUrl() {
      const url = new URL(`${BASE}/api/stats`, location.origin);
      if (requestedChannel) url.searchParams.set('channel', requestedChannel);
      return url.toString();
    }
    function eventsUrl() {
      const url = new URL(`${BASE}/api/events`, location.origin);
      if (requestedChannel) url.searchParams.set('channel', requestedChannel);
      return url.toString();
    }
    function activeGoals(stats) {
      return Array.isArray(stats?.goals) ? stats.goals : [];
    }
    function autoGoalIndex(total, goals) {
      const safeTotal = Math.max(0, total || 0);
      const nextIndex = goals.findIndex((goal) => safeTotal < goal.subs);
      return nextIndex === -1 ? goals.length - 1 : nextIndex;
    }
    function goalState(total, goals) {
      const safeTotal = Math.max(0, total || 0);
      if (!goals.length) {
        return {
          total: safeTotal,
          next: 0,
          progress: 0,
          label: '',
          empty: true,
        };
      }
      const index = autoGoalIndex(safeTotal, goals);
      const goal = goals[index];
      const prevGoal = index > 0 ? goals[index - 1] : { subs: 0, label: 'subathon start' };
      const complete = safeTotal >= goal.subs;
      const span = Math.max(1, goal.subs - prevGoal.subs);
      const progress = complete ? 1 : Math.max(0, Math.min(1, (safeTotal - prevGoal.subs) / span));
      return {
        total: safeTotal,
        next: goal.subs,
        progress,
        label: goal.label,
        empty: false,
      };
    }
    function layoutGoal(label, allowMarquee) {
      const goalEl = document.getElementById('goal-name');
      const goalTextEl = document.getElementById('goal-name-text');
      const overlayEl = document.querySelector('.overlay');
      const targetEl = document.querySelector('.eyebrow-target');
      const labelEl = document.querySelector('.eyebrow-label');
      const measureEl = document.getElementById('goal-width-measure');
      const bodyStyle = getComputedStyle(document.body);
      const paddingX = (parseFloat(bodyStyle.paddingLeft) || 0) + (parseFloat(bodyStyle.paddingRight) || 0);
      const overlayStyle = getComputedStyle(overlayEl);
      const panelPad = (parseFloat(overlayStyle.paddingLeft) || 0) + (parseFloat(overlayStyle.paddingRight) || 0);
      const border = ((parseFloat(overlayStyle.borderLeftWidth) || 0) + (parseFloat(overlayStyle.borderRightWidth) || 0));
      const maxContentWidth = Math.max(180, Math.floor(window.innerWidth - paddingX - panelPad - border - 2));

      goalTextEl.textContent = label;
      goalEl.classList.remove('marquee');
      requestAnimationFrame(() => {
        const labelWidth = labelEl.scrollWidth;
        const targetWidth = targetEl.scrollWidth;
        measureEl.className = document.body.className;
        measureEl.style.fontFamily = getComputedStyle(goalEl).fontFamily;
        measureEl.style.fontSize = getComputedStyle(goalEl).fontSize;
        measureEl.style.fontWeight = getComputedStyle(goalEl).fontWeight;
        measureEl.style.letterSpacing = getComputedStyle(goalEl).letterSpacing;
        measureEl.textContent = label;
        const baselineWidth = Math.ceil(measureEl.scrollWidth);
        const goalWidth = Math.min(maxContentWidth, Math.max(180, baselineWidth));
        const headerWidth = Math.min(maxContentWidth, labelWidth + targetWidth + 16);
        const contentWidth = Math.max(goalWidth, headerWidth);
        overlayEl.style.setProperty('--goal-width', `${goalWidth}px`);
        overlayEl.style.setProperty('--content-width', `${contentWidth}px`);
        const textWidth = goalTextEl.scrollWidth;
        const visibleWidth = goalEl.clientWidth;
        goalEl.style.setProperty('--goal-visible-width', `${visibleWidth}px`);
        if (allowMarquee && textWidth > visibleWidth && label.length > 20) {
          const extra = Math.max(0, textWidth - visibleWidth);
          const duration = Math.max(8, Math.min(18, 7 + (extra / 45)));
          goalEl.style.setProperty('--goal-marquee-duration', `${duration}s`);
          goalEl.classList.add('marquee');
        }
      });
    }
    function renderGoal(stats) {
      if (stats?.notFound) {
        document.getElementById('goal-current').textContent = '0';
        document.getElementById('goal-next').textContent = '0';
        layoutGoal('channel not public', false);
        document.getElementById('goal-fill').style.width = '0%';
        return;
      }
      const total = (stats?.totalSubs || 0) + (stats?.giftedSubs || 0);
      const goals = activeGoals(stats);
      const goal = goalState(total, goals);
      document.getElementById('goal-current').textContent = fmt(total);
      document.getElementById('goal-next').textContent = goal.empty ? '—' : fmt(goal.next);
      layoutGoal(goal.empty ? 'No goals configured' : goal.label, !goal.empty);
      document.getElementById('goal-fill').style.width = `${goal.progress * 100}%`;
    }

    const BASE = '__APP_BASE_PATH__';

    async function refreshStats() {
      const stats = await fetch(statsUrl()).then((r) => r.json());
      renderGoal(stats);
    }

    let sse;
    function connect() {
      if (sse) sse.close();
      sse = new EventSource(eventsUrl());
      sse.onmessage = (e) => {
        let msg;
        try { msg = JSON.parse(e.data); } catch { return; }
        if (msg.stats) renderGoal(msg.stats);
      };
    }

    async function init() {
      await refreshStats();
      connect();
      setInterval(async () => {
        try { await refreshStats(); } catch {}
      }, 30000);
    }

    init();
  </script>
</body>
</html>
